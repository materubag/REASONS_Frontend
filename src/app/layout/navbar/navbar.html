<header class="sticky top-0 z-50 bg-surface border-b border-muted-blue-gray">
	<div
		class="flex justify-between items-center px-margin-mobile md:px-margin-desktop w-full max-w-max-width mx-auto h-16 transition-all duration-200 ease-in-out">
		<div class="flex items-center gap-4">
			<a class="font-headline-md text-headline-md font-bold text-primary flex items-center gap-2" routerLink="/">
				<img [src]="grupoInformacion?.miniLogo ? resolveBackendUrl(grupoInformacion?.miniLogo) : '/Logo_sin_fondo.png'" alt="REASONS Logo" class="h-8 w-auto object-contain" />
				REASONS
			</a>
		</div>
		<nav class="hidden md:flex items-center gap-8 h-full">
			<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors h-full flex items-center px-2 hover:bg-surface-container rounded-DEFAULT"
				routerLink="/" routerLinkActive="text-primary border-b-2 border-primary pb-1"
				[routerLinkActiveOptions]="{exact: true}">Inicio</a>
			<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors h-full flex items-center px-2 hover:bg-surface-container rounded-DEFAULT"
				routerLink="/investigadores" routerLinkActive="text-primary border-b-2 border-primary pb-1">Equipo</a>
			<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors h-full flex items-center px-2 hover:bg-surface-container rounded-DEFAULT"
				routerLink="/proyectos" routerLinkActive="text-primary border-b-2 border-primary pb-1">Proyectos</a>
			<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors h-full flex items-center px-2 hover:bg-surface-container rounded-DEFAULT"
				routerLink="/publicaciones"
				routerLinkActive="text-primary border-b-2 border-primary pb-1">Publicaciones</a>
			<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors h-full flex items-center px-2 hover:bg-surface-container rounded-DEFAULT"
				routerLink="/contactos" routerLinkActive="text-primary border-b-2 border-primary pb-1">Contacto</a>
		</nav>
		<div class="flex items-center gap-2">
			<!-- Dark Mode Toggle -->
			<button
				(click)="toggleDarkMode()"
				class="text-secondary hover:bg-surface-container p-2 rounded-full transition-colors flex items-center justify-center cursor-pointer"
				[title]="isDarkMode ? 'Activar modo claro' : 'Activar modo oscuro'"
			>
				<span class="material-symbols-outlined">
					{{ isDarkMode ? 'light_mode' : 'dark_mode' }}
				</span>
			</button>

			<a
				routerLink="/admin"
				class="text-primary hover:bg-surface-container p-2 rounded-full transition-colors flex items-center justify-center cursor-pointer"
				title="Soy investigador"
			>
				<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">school</span>
			</a>
			
			<!-- Hamburger Menu Button for Mobile -->
			<button
				(click)="toggleMobileMenu()"
				class="md:hidden text-secondary hover:bg-surface-container p-2 rounded-full transition-colors flex items-center justify-center cursor-pointer"
				title="Menú"
			>
				<span class="material-symbols-outlined">
					{{ isMobileMenuOpen ? 'close' : 'menu' }}
				</span>
			</button>
		</div>
	</div>

	<!-- Mobile Sidebar Overlay (Backdrop) -->
	<div 
		*ngIf="isMobileMenuOpen"
		(click)="closeMobileMenu()"
		class="md:hidden fixed inset-0 bg-black/50 z-40 transition-opacity duration-300"
	></div>

	<!-- Mobile Sidebar Drawer (Slides in from the right) -->
	<div 
		class="md:hidden fixed top-0 right-0 h-full w-72 bg-surface-container border-l border-muted-blue-gray shadow-2xl z-50 transform transition-transform duration-300 ease-in-out flex flex-col justify-between"
		[ngClass]="isMobileMenuOpen ? 'translate-x-0' : 'translate-x-full'"
	>
		<div>
			<!-- Sidebar Header with Close Button -->
			<div class="flex items-center justify-between px-6 h-16 border-b border-muted-blue-gray bg-surface">
				<span class="font-headline-sm text-headline-sm font-bold text-primary flex items-center gap-2">
					<img [src]="grupoInformacion?.miniLogo ? resolveBackendUrl(grupoInformacion?.miniLogo) : '/Logo_sin_fondo.png'" alt="REASONS Logo" class="h-8 w-auto object-contain" />
					REASONS
				</span>
				<button 
					(click)="closeMobileMenu()" 
					class="p-2 text-secondary hover:bg-surface-container rounded-full transition-colors flex items-center justify-center cursor-pointer"
				>
					<span class="material-symbols-outlined">close</span>
				</button>
			</div>

			<!-- Mobile Navigation Links -->
			<nav class="flex flex-col p-6 gap-4">
				<a 
					routerLink="/" 
					routerLinkActive="text-primary bg-primary/10 font-bold border-l-4 border-primary pl-3" 
					[routerLinkActiveOptions]="{exact: true}"
					(click)="closeMobileMenu()"
					class="font-label-lg text-label-lg text-secondary hover:text-primary transition-all p-3 rounded-lg flex items-center gap-3 hover:bg-surface-container"
				>
					<span class="material-symbols-outlined text-[20px]">home</span>
					Inicio
				</a>
				<a 
					routerLink="/investigadores" 
					routerLinkActive="text-primary bg-primary/10 font-bold border-l-4 border-primary pl-3"
					(click)="closeMobileMenu()"
					class="font-label-lg text-label-lg text-secondary hover:text-primary transition-all p-3 rounded-lg flex items-center gap-3 hover:bg-surface-container"
				>
					<span class="material-symbols-outlined text-[20px]">groups</span>
					Equipo
				</a>
				<a 
					routerLink="/proyectos" 
					routerLinkActive="text-primary bg-primary/10 font-bold border-l-4 border-primary pl-3"
					(click)="closeMobileMenu()"
					class="font-label-lg text-label-lg text-secondary hover:text-primary transition-all p-3 rounded-lg flex items-center gap-3 hover:bg-surface-container"
				>
					<span class="material-symbols-outlined text-[20px]">folder_open</span>
					Proyectos
				</a>
				<a 
					routerLink="/publicaciones" 
					routerLinkActive="text-primary bg-primary/10 font-bold border-l-4 border-primary pl-3"
					(click)="closeMobileMenu()"
					class="font-label-lg text-label-lg text-secondary hover:text-primary transition-all p-3 rounded-lg flex items-center gap-3 hover:bg-surface-container"
				>
					<span class="material-symbols-outlined text-[20px]">book</span>
					Publicaciones
				</a>
				<a 
					routerLink="/contactos" 
					routerLinkActive="text-primary bg-primary/10 font-bold border-l-4 border-primary pl-3"
					(click)="closeMobileMenu()"
					class="font-label-lg text-label-lg text-secondary hover:text-primary transition-all p-3 rounded-lg flex items-center gap-3 hover:bg-surface-container"
				>
					<span class="material-symbols-outlined text-[20px]">mail</span>
					Contacto
				</a>
			</nav>
		</div>

		<!-- Mobile Sidebar Footer with School Link -->
		<div class="p-6 border-t border-muted-blue-gray bg-surface flex flex-col gap-3">
			<a
				routerLink="/admin"
				(click)="closeMobileMenu()"
				class="w-full inline-flex items-center justify-center gap-2.5 px-4 py-3 bg-primary text-on-primary font-semibold rounded-lg hover:bg-primary-dark transition-colors shadow-sm cursor-pointer"
			>
				<span class="material-symbols-outlined">school</span>
				Portal Investigador
			</a>
			<p class="text-[10px] text-center text-slate-gray mt-2">© 2026 REASONS - UTA</p>
		</div>
	</div>
</header>
