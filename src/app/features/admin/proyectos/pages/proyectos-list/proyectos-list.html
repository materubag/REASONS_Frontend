<!-- Header Section -->
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold text-deep-navy font-headline-lg">Gestión de Proyectos</h1>
  </div>
  <a 
    routerLink="/admin/proyectos/create"
    class="inline-flex items-center justify-center px-5 py-3 bg-primary text-on-primary font-semibold rounded-lg hover:bg-primary-dark transition-colors shadow-sm w-full sm:w-auto"
  >
    <span class="material-symbols-outlined mr-2">add</span>
    Agregar Proyecto
  </a>
</div>

<!-- Search & View Toggle Toolbar -->
<div class="bg-surface-container-low border border-muted-blue-gray/30 rounded-xl p-4 mb-6 flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
  <!-- Search -->
  <div class="relative flex-1">
    <span class="absolute left-3 top-3 text-slate-gray">
      <span class="material-symbols-outlined text-[20px]">search</span>
    </span>
    <input 
      type="text" 
      [(ngModel)]="searchTerm" 
      (ngModelChange)="onSearchChange()"
      placeholder="Buscar por título, descripción u objetivos..." 
      class="w-full bg-surface-container-lowest border border-muted-blue-gray/30 rounded-lg pl-10 pr-4 py-2.5 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm"
    >
  </div>

  <!-- View Toggle Buttons -->
  <div class="flex items-center bg-surface-container-high rounded-lg p-1 space-x-1 self-end md:self-auto shadow-inner">
    <button 
      (click)="switchView('grid')"
      [ngClass]="viewMode === 'grid' ? 'bg-surface-container-lowest text-primary font-semibold shadow-sm' : 'text-slate-gray hover:text-deep-navy'"
      class="p-2 rounded-md transition-all flex items-center justify-center"
      title="Vista de Tarjetas"
    >
      <span class="material-symbols-outlined text-[20px]">grid_view</span>
    </button>
    <button 
      (click)="switchView('table')"
      [ngClass]="viewMode === 'table' ? 'bg-surface-container-lowest text-primary font-semibold shadow-sm' : 'text-slate-gray hover:text-deep-navy'"
      class="p-2 rounded-md transition-all flex items-center justify-center"
      title="Vista de Tabla"
    >
      <span class="material-symbols-outlined text-[20px]">table_chart</span>
    </button>
  </div>
</div>

<!-- Loading Spinner -->
<div *ngIf="loading" class="flex flex-col items-center justify-center py-20 px-8 bg-surface-container border border-border/10 rounded-xl max-w-md mx-auto shadow-sm my-6">
  <div class="relative w-24 h-24 flex items-center justify-center mb-4">
    <img 
      src="/Logo_sin_fondo.png" 
      alt="REASONS logo"
      class="w-24 h-24 object-contain animate-[spin_4s_linear_infinite]"
    />
  </div>
  <p class="font-bold text-xl text-deep-navy font-serif mb-1" style="font-family: 'Source Serif 4', 'Georgia', serif;">REASONS</p>
  <p class="text-sm text-slate-gray text-center select-none">Cargando proyectos...</p>
</div>

<!-- Main Views -->
<div *ngIf="!loading">
  <!-- Card Grid View -->
  <div *ngIf="viewMode === 'grid'" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <div 
      *ngFor="let proj of paginatedProyectos"
      class="bg-surface-container-lowest border border-muted-blue-gray/30 rounded-xl overflow-hidden hover:shadow-[0px_4px_20px_rgba(8,31,77,0.08)] hover:border-primary transition-all duration-300 flex flex-col justify-between group"
    >
      <!-- Project Cover -->
      <div class="h-44 bg-surface-container-low relative overflow-hidden flex-shrink-0">
        <img 
          [src]="proj.imagen ? resolveBackendUrl(proj.imagen) : defaultImage" 
          [alt]="proj.titulo"
          class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
        >
      </div>

      <!-- Details -->
      <div class="p-5 flex-grow flex flex-col justify-between">
        <div class="space-y-3">
          <h3 class="font-bold text-deep-navy text-base leading-tight group-hover:text-primary transition-colors line-clamp-2">
            {{ proj.titulo }}
          </h3>
          <p class="text-xs text-slate-gray line-clamp-3 text-justify font-body-sm">
            {{ proj.descripcion }}
          </p>
        </div>

        <div class="flex items-center space-x-2 border-t border-surface-container-high pt-4 mt-4">
          <a 
            [routerLink]="['/admin/proyectos/edit', proj.id]"
            class="flex-1 inline-flex items-center justify-center py-2 px-3 bg-surface-container text-deep-navy hover:bg-primary hover:text-on-primary font-semibold text-xs rounded-lg transition-colors"
          >
            <span class="material-symbols-outlined text-[16px] mr-1.5">edit</span>
            Editar
          </a>
          <button 
            (click)="deleteProyecto(proj.id)"
            class="inline-flex items-center justify-center p-2 bg-surface-container text-error hover:bg-error-container hover:text-on-error-container rounded-lg transition-colors"
            title="Eliminar"
          >
            <span class="material-symbols-outlined text-[16px]">delete</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredProyectos.length === 0" class="col-span-full bg-surface-container-lowest border border-muted-blue-gray/30 rounded-xl p-12 text-center text-slate-gray">
      <span class="material-symbols-outlined text-5xl block mb-2 opacity-50">drafts</span>
      <p class="font-semibold text-deep-navy">No se encontraron proyectos</p>
      <p class="text-xs mt-1">Prueba a escribir otro término de búsqueda.</p>
    </div>
  </div>

  <!-- Table View -->
  <div *ngIf="viewMode === 'table'">
    <app-proyecto-table 
      [proyectos]="paginatedProyectos"
      (delete)="deleteProyecto($event)"
    ></app-proyecto-table>
  </div>

  <!-- Pagination Component -->
  <app-pagination 
    [currentPage]="currentPage" 
    [pageSize]="pageSize" 
    [totalItems]="filteredProyectos.length" 
    (pageChange)="goToPage($event)"
  ></app-pagination>
</div>
