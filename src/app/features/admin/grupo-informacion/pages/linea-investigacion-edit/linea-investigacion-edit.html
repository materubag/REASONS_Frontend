<div *ngIf="loading" class="flex flex-col items-center justify-center py-24">
  <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
  <p class="text-sm text-slate-gray mt-4 font-semibold">Cargando información de la línea...</p>
</div>

<div *ngIf="!loading" class="bg-surface-container-lowest border border-muted-blue-gray/30 rounded-xl p-8 w-full shadow-sm">
  <div class="border-b border-surface-container-high pb-4 mb-6">
    <h2 class="text-2xl font-bold text-deep-navy">Editar Línea de Investigación</h2>
    <p class="text-sm text-slate-gray mt-1">Modifica los detalles y descripción de esta línea de investigación.</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Nombre -->
    <div class="space-y-1">
      <label class="block text-xs font-semibold text-deep-navy uppercase tracking-wider" for="nombre">Nombre de la Línea *</label>
      <input 
        id="nombre"
        type="text" 
        formControlName="nombre"
        placeholder="Ej: Software, Tecnologías de la Información y Ciencias de Datos"
        class="w-full bg-surface-container-low border border-muted-blue-gray/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md"
      >
      <div *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid" class="text-xs text-error font-medium mt-1">
        <span *ngIf="form.get('nombre')?.errors?.['required']">El nombre es requerido.</span>
        <span *ngIf="form.get('nombre')?.errors?.['minlength']">El nombre debe tener al menos 3 caracteres.</span>
      </div>
    </div>

    <!-- Descripción -->
    <div class="space-y-1">
      <label class="block text-xs font-semibold text-deep-navy uppercase tracking-wider" for="descripcion">Descripción *</label>
      <textarea 
        id="descripcion"
        formControlName="descripcion"
        rows="6"
        placeholder="Describe detalladamente el alcance, las tecnologías investigadas y los objetivos de esta línea de investigación..."
        class="w-full bg-surface-container-low border border-muted-blue-gray/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md resize-y"
      ></textarea>
      <div *ngIf="form.get('descripcion')?.touched && form.get('descripcion')?.invalid" class="text-xs text-error font-medium mt-1">
        <span *ngIf="form.get('descripcion')?.errors?.['required']">La descripción es requerida.</span>
        <span *ngIf="form.get('descripcion')?.errors?.['minlength']">La descripción debe tener al menos 10 caracteres.</span>
      </div>
    </div>

    <!-- Submit buttons -->
    <div class="flex items-center justify-end space-x-4 border-t border-surface-container-high pt-6">
      <a 
        routerLink="/admin/grupo-informacion/lineas"
        class="inline-flex items-center justify-center px-6 py-3 bg-surface-container text-deep-navy font-semibold rounded-lg hover:bg-surface-container-high transition-colors"
      >
        Cancelar
      </a>
      <button 
        type="submit" 
        [disabled]="form.invalid || isSubmitting"
        [ngClass]="{'opacity-75 cursor-not-allowed': form.invalid || isSubmitting}"
        class="inline-flex items-center justify-center px-6 py-3 bg-primary text-on-primary font-semibold rounded-lg hover:bg-primary-dark transition-colors shadow-sm"
      >
        <span *ngIf="isSubmitting" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span>
        <svg *ngIf="!isSubmitting" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
        </svg>
        Guardar Cambios
      </button>
    </div>
  </form>
</div>
