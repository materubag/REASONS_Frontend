<div class="overflow-x-auto border border-muted-blue-gray/30 rounded-xl bg-surface-container-lowest shadow-sm">
  <table class="w-full border-collapse text-left">
    <thead>
      <tr class="bg-surface-container border-b border-muted-blue-gray/20">
        <th class="p-4 font-semibold text-deep-navy text-xs uppercase tracking-wider w-20">Foto</th>
        <th class="p-4 font-semibold text-deep-navy text-xs uppercase tracking-wider">Nombre</th>
        <th class="p-4 font-semibold text-deep-navy text-xs uppercase tracking-wider">Cargo</th>
        <th class="p-4 font-semibold text-deep-navy text-xs uppercase tracking-wider">Correo</th>
        <th class="p-4 font-semibold text-deep-navy text-xs uppercase tracking-wider w-28">Acciones</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-surface-container-high text-on-surface">
      <tr *ngFor="let researcher of investigadores" class="hover:bg-background/40 transition-colors">
        <!-- Foto -->
        <td class="p-4">
          <img 
            [src]="researcher.foto ? resolveBackendUrl(researcher.foto) : defaultAvatar" 
            [alt]="researcher.nombre"
            class="w-12 h-12 rounded-full object-cover border border-muted-blue-gray/20 shadow-sm"
          >

        </td>

        <!-- Nombre -->
        <td class="p-4 font-medium text-deep-navy">
          {{ researcher.nombre }}
        </td>

        <!-- Cargo -->
        <td class="p-4 text-sm">
          <span [ngClass]="{
            'bg-primary/10 text-primary border border-primary/20': !researcher.cargo || researcher.cargo === 'Investigador',
            'bg-secondary/10 text-secondary border border-secondary/20': researcher.cargo === 'Subdirector',
            'bg-success/10 text-success border border-success/20': researcher.cargo === 'Director'
          }" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold">
            {{ researcher.cargo || 'Investigador' }}
          </span>
        </td>

        <!-- Correo -->
        <td class="p-4 text-sm text-slate-gray">
          {{ researcher.correo || researcher.email || 'N/A' }}
        </td>

        <!-- Acciones -->
        <td class="p-4">
          <div class="flex items-center space-x-2">
            <a 
              [routerLink]="['/admin/investigadores/edit', researcher.id]"
              class="inline-flex items-center justify-center p-2 rounded bg-surface-container text-deep-navy hover:bg-primary/10 hover:text-primary transition-all"
              title="Editar"
            >
              <span class="material-symbols-outlined text-[18px]">edit</span>
            </a>
            <button 
              (click)="onDelete(researcher.id)"
              class="inline-flex items-center justify-center p-2 rounded bg-surface-container text-error hover:bg-error-container hover:text-on-error-container transition-all"
              title="Eliminar"
            >
              <span class="material-symbols-outlined text-[18px]">delete</span>
            </button>
          </div>
        </td>
      </tr>

      <tr *ngIf="investigadores.length === 0">
        <td colspan="5" class="p-8 text-center text-slate-gray text-sm">
          <span class="material-symbols-outlined text-4xl block mb-2 opacity-50">drafts</span>
          No se encontraron investigadores con los filtros actuales.
        </td>
      </tr>
    </tbody>
  </table>
</div>
