<div (click)="onContainerClick($event)" [class.fullscreen]="isFullscreen" class="rich-text-editor-container border border-cool-gray focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-all rounded-DEFAULT bg-surface-container-lowest overflow-hidden flex flex-col">
  <!-- Toolbar -->
  <div class="editor-toolbar bg-surface-container-low border-b border-cool-gray p-2 flex flex-wrap gap-1.5 items-center w-full">
    <button type="button" class="toolbar-btn" [class.active]="isBold" (click)="format('bold')" title="Negrita">
      <i class="bi bi-type-bold"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isItalic" (click)="format('italic')" title="Cursiva">
      <i class="bi bi-type-italic"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isUnderline" (click)="format('underline')" title="Subrayado">
      <i class="bi bi-type-underline"></i>
    </button>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <button type="button" class="toolbar-btn" [class.active]="isH1" (click)="format('formatBlock', '<h1>')" title="Título 1">
      <i class="bi bi-type-h1"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isH2" (click)="format('formatBlock', '<h2>')" title="Título 2">
      <i class="bi bi-type-h2"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isParagraph" (click)="format('formatBlock', '<p>')" title="Texto Normal">
      <i class="bi bi-paragraph"></i>
    </button>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <select class="toolbar-select" [value]="currentFontSize" (change)="setFontSize($event)" title="Tamaño de letra">
      <option value=""></option>
      <option value="2">13</option>
      <option value="3">16</option>
      <option value="4">18</option>
      <option value="5">24</option>
      <option value="6">32</option>
      <option value="7">48</option>
    </select>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <button type="button" class="toolbar-btn" [class.active]="isUnorderedList" (click)="format('insertUnorderedList')" title="Lista Viñetas">
      <i class="bi bi-list-ul"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isOrderedList" (click)="format('insertOrderedList')" title="Lista Numerada">
      <i class="bi bi-list-ol"></i>
    </button>
    <button type="button" class="toolbar-btn" (click)="addLink()" title="Insertar Enlace">
      <i class="bi bi-link-45deg"></i>
    </button>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <button type="button" class="toolbar-btn" [class.active]="isAlignLeft" (click)="format('justifyLeft')" title="Alinear a la izquierda">
      <i class="bi bi-text-left"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isAlignCenter" (click)="format('justifyCenter')" title="Centrar">
      <i class="bi bi-text-center"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isAlignRight" (click)="format('justifyRight')" title="Alinear a la derecha">
      <i class="bi bi-text-right"></i>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isAlignJustify" (click)="format('justifyFull')" title="Justificar">
      <i class="bi bi-justify"></i>
    </button>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <button type="button" class="toolbar-btn text-error hover:bg-error/10" (click)="format('removeFormat')" title="Borrar Formato">
      <i class="bi bi-eraser"></i>
    </button>
    <div class="w-[1px] h-5 bg-cool-gray/30 mx-1"></div>
    <button type="button" class="toolbar-btn text-primary hover:bg-primary/10 ml-auto" (click)="toggleFullscreen()" [title]="isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa'">
      <i class="bi" [ngClass]="isFullscreen ? 'bi-fullscreen-exit' : 'bi-arrows-fullscreen'"></i>
    </button>
  </div>

  <!-- Editable Div -->
  <div
    #editor
    contenteditable="true"
    [attr.placeholder]="placeholder"
    (input)="onInput()"
    (blur)="onBlur()"
    (paste)="onPaste($event)"
    (keyup)="updateToolbarStates()"
    (mouseup)="updateToolbarStates()"
    (click)="updateToolbarStates()"
    (focus)="updateToolbarStates()"
    class="editor-content p-4 min-h-[160px] max-h-[400px] overflow-y-auto outline-none text-deep-navy font-body-md text-body-md"
  ></div>
</div>
